version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: attendance-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend-api:
    build: ./backend
    container_name: attendance-backend
    restart: always
    ports:
      - "5025:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - QR_SECRET=${QR_SECRET}
      - PORT=${PORT}
    depends_on:
      - postgres-db
    volumes:
      - ams_backups:/app/backups

  frontend-app:
    build: ./frontend
    container_name: attendance-frontend
    restart: always
    ports:
      - "3000:80"
      - "3443:443"
    depends_on:
      - backend-api

volumes:
  postgres_data:
  ams_backups:
